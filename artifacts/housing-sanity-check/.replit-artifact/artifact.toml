kind = "web"
previewPath = "/"
title = "Housing Sanity Check"
version = "1.0.0"
id = "artifacts/housing-sanity-check"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25786

[services.development]
run = "pnpm --filter @workspace/housing-sanity-check run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/housing-sanity-check", "run", "build" ]
publicDir = "artifacts/housing-sanity-check/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25786"
BASE_PATH = "/"
